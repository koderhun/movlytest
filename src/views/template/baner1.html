<section class="section baner">
  <div class="container">
    <h1 class="baner__title"><em>стираем границы</em> между вами
      и свободой жить в любой точке мира
    </h1>
    <p class="baner__text">С нами вы получите ВНЖ в любой стране. <br>
      Без стресса и с сопровождением на всех этапах.</p>

    <div class="baner__btnblock">
      <a href="#" class="btn btn--image btn--large">
        Узнать больше
        <div class="btn__image ">
          <img src="./images/teleg-blue.svg" alt="telega">
        </div>
      </a>
    </div>

    <div class="slider1">
      <section class="slider-section">
        <div class="slider-section__container">
          <div class="slider-section__wrapper swiper-wrapper">
            <!-- Слайд 1 -->
            <div class="slider-section__slide swiper-slide" data-index="0">
              <div class="slider-section__content">
                <div class="slider-section__image">
                  <img src="./images/netherlands.jpg" alt="Нидерланды">
                </div>
                <p class="slider-section__desc">
                  <span class="pic pic--local"></span>
                  Нидерланды
                </p>
              </div>
            </div>

            <!-- Слайд 2 -->
            <div class="slider-section__slide swiper-slide" data-index="1">
              <div class="slider-section__content">
                <div class="slider-section__image">
                  <img src="./images/uk.jpg" alt="Великобритания">
                </div>
                <p class="slider-section__desc">
                  <span class="pic pic--local"></span>
                  Великобритания
                </p>
              </div>
            </div>

            <div class="slider-section__slide swiper-slide slider-section__slide--active" data-index="2">
              <div class="slider-section__content">
                <div class="slider-section__image">
                  <img src="./images/france.jpg" alt="Франция">
                </div>
                <p class="slider-section__desc">
                  <span class="pic pic--local"></span>
                  Франция
                </p>
              </div>
            </div>

            <div class="slider-section__slide swiper-slide" data-index="3">
              <div class="slider-section__content">
                <div class="slider-section__image">
                  <img src="./images/portugale.jpg" alt="Португалия">
                </div>
                <p class="slider-section__desc">
                  <span class="pic pic--local"></span>
                  Португалия
                </p>
              </div>
            </div>

            <div class="slider-section__slide swiper-slide" data-index="4">
              <div class="slider-section__content">
                <div class="slider-section__image">
                  <img src="./images/spain.jpg" alt="Испания">
                </div>
                <p class="slider-section__desc">
                  <span class="pic pic--local"></span>
                  Испания
                </p>
              </div>
            </div>

            <!-- Добавьте больше слайдов по необходимости -->
          </div>

          <!-- Навигация -->
          <div class="slider-section__nav">
            <button class="slider-section__button slider-section__button--prev" aria-label="Предыдущий">
              <svg width="24" height="24" viewBox="0 0 24 24">
                <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" fill="none" />
              </svg>
            </button>
            <button class="slider-section__button slider-section__button--next" aria-label="Следующий">
              <svg width="24" height="24" viewBox="0 0 24 24">
                <path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" fill="none" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Информационный блок с активным элементом -->
        <div class="info-block">
          <div class="info-block__content">
            <h2 class="info-block__title">Активный элемент</h2>
            <p class="info-block__text" id="activeInfo">Элемент 3</p>
          </div>
        </div>
      </section>
    </div>
  </div>
</section>
